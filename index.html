<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jihyeok Ryu — ML Engineer</title>
<link rel="stylesheet" href="./styles.css" />
<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--surface-page); color: var(--text-body); font-family: var(--font-sans); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="./_ds_bundle.js"></script>

  <script type="text/babel" data-presets="react" src="Header.jsx"></script>
  <script type="text/babel" data-presets="react" src="Hero.jsx"></script>
  <script type="text/babel" data-presets="react" src="ProjectsCaseStudy.jsx"></script>
  <script type="text/babel" data-presets="react" src="LearningReal.jsx"></script>
  <script type="text/babel" data-presets="react" src="Bookshelf.jsx"></script>
  <script type="text/babel" data-presets="react" src="About.jsx"></script>
  <script type="text/babel" data-presets="react" src="Skills.jsx"></script>
  <script type="text/babel" data-presets="react" src="Footer.jsx"></script>

  <script type="text/babel" data-presets="react">
    const SECTIONS = ["projects", "learning", "reading", "about", "skills"];

    function App() {
      const [theme, setTheme] = React.useState(() => localStorage.getItem("portfolio-theme") || "light");
      const [active, setActive] = React.useState("top");

      React.useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("portfolio-theme", theme);
      }, [theme]);

      React.useEffect(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });
        }, { rootMargin: "-45% 0px -50% 0px" });
        SECTIONS.forEach((id) => { const el = document.getElementById(id); if (el) obs.observe(el); });
        return () => obs.disconnect();
      }, []);

      const nav = (id) => {
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: id === "top" ? 0 : el.offsetTop - 64, behavior: "smooth" });
      };

      return (
        <React.Fragment>
          <Header theme={theme} onToggleTheme={() => setTheme((t) => (t === "dark" ? "light" : "dark"))} active={active} onNav={nav} />
          <main>
            <Hero onNav={nav} />
            <ProjectsCaseStudy />
            <LearningReal />
            <Bookshelf />
            <About />
            <Skills />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
